<svg viewBox="0 0 820 310" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">

  <defs>
    <marker id="arr-orange" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#EC7211"/>
    </marker>
    <marker id="arr-gray" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#879596"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#1D8348"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#D13212"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="310" fill="#f8f9fa" rx="10"/>

  <!-- ── CLIENTE ─────────────────────────────────────────── -->
  <rect x="18" y="115" width="80" height="70" rx="8" fill="none" stroke="#879596" stroke-width="1.5"/>
  <text x="58" y="143" text-anchor="middle" font-size="22" fill="#879596">🖥</text>
  <text x="58" y="162" text-anchor="middle" font-size="11" fill="#555" font-weight="600">Cliente</text>
  <text x="58" y="176" text-anchor="middle" font-size="10" fill="#879596">internet</text>

  <!-- flecha cliente → listener -->
  <line x1="98" y1="150" x2="149" y2="150" stroke="#EC7211" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="123" y="143" text-anchor="middle" font-size="10" fill="#EC7211" font-weight="600">HTTPS</text>

  <!-- ── LISTENER ────────────────────────────────────────── -->
  <rect x="150" y="90" width="130" height="120" rx="8" fill="#fff" stroke="#EC7211" stroke-width="2"/>
  <text x="215" y="113" text-anchor="middle" font-size="13" fill="#EC7211" font-weight="700">Listener</text>
  <line x1="158" y1="120" x2="272" y2="120" stroke="#EC7211" stroke-width="0.8" stroke-dasharray="3,3"/>

  <rect x="163" y="127" width="104" height="22" rx="4" fill="#FFF3E0"/>
  <text x="215" y="142" text-anchor="middle" font-size="11" fill="#555">:80 → Redirect 443</text>

  <rect x="163" y="155" width="104" height="22" rx="4" fill="#FFF3E0"/>
  <text x="215" y="170" text-anchor="middle" font-size="11" fill="#555">:443 → Target Group</text>

  <!-- flecha listener → ELB -->
  <line x1="280" y1="150" x2="329" y2="150" stroke="#EC7211" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- ── ELB (core) ──────────────────────────────────────── -->
  <rect x="330" y="105" width="120" height="90" rx="8" fill="#EC7211"/>
  <text x="390" y="133" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">ELB</text>
  <text x="390" y="151" text-anchor="middle" font-size="11" fill="#fff">Elastic Load</text>
  <text x="390" y="166" text-anchor="middle" font-size="11" fill="#fff">Balancer</text>
  <text x="390" y="184" text-anchor="middle" font-size="10" fill="#FFD580">round-robin</text>

  <!-- flecha ELB → Target Group -->
  <line x1="450" y1="150" x2="499" y2="150" stroke="#EC7211" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- ── TARGET GROUP ───────────────────────────────────── -->
  <rect x="500" y="60" width="300" height="190" rx="8" fill="#fff" stroke="#879596" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="650" y="84" text-anchor="middle" font-size="13" fill="#555" font-weight="700">Target Group</text>
  <line x1="508" y1="92" x2="792" y2="92" stroke="#879596" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- instancia 1 — healthy -->
  <rect x="518" y="103" width="80" height="60" rx="6" fill="#EAFAF1" stroke="#1D8348" stroke-width="1.5"/>
  <text x="558" y="125" text-anchor="middle" font-size="11" fill="#1D8348" font-weight="600">EC2 ✓</text>
  <text x="558" y="141" text-anchor="middle" font-size="10" fill="#555">i-0ab12</text>
  <text x="558" y="155" text-anchor="middle" font-size="10" fill="#1D8348">Healthy</text>

  <!-- instancia 2 — healthy -->
  <rect x="610" y="103" width="80" height="60" rx="6" fill="#EAFAF1" stroke="#1D8348" stroke-width="1.5"/>
  <text x="650" y="125" text-anchor="middle" font-size="11" fill="#1D8348" font-weight="600">EC2 ✓</text>
  <text x="650" y="141" text-anchor="middle" font-size="10" fill="#555">i-0cd34</text>
  <text x="650" y="155" text-anchor="middle" font-size="10" fill="#1D8348">Healthy</text>

  <!-- instancia 3 — unhealthy -->
  <rect x="702" y="103" width="80" height="60" rx="6" fill="#FDEDEC" stroke="#D13212" stroke-width="1.5"/>
  <text x="742" y="125" text-anchor="middle" font-size="11" fill="#D13212" font-weight="600">EC2 ✗</text>
  <text x="742" y="141" text-anchor="middle" font-size="10" fill="#555">i-0ef56</text>
  <text x="742" y="155" text-anchor="middle" font-size="10" fill="#D13212">Unhealthy</text>

  <!-- Health Check arrows: ELB → instancias (dashed) -->
  <!-- ELB → inst 1 -->
  <path d="M390,195 Q390,230 558,220 L558,163" fill="none" stroke="#1D8348" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arr-green)"/>
  <!-- ELB → inst 2 -->
  <path d="M390,195 Q390,240 650,235 L650,163" fill="none" stroke="#1D8348" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arr-green)"/>
  <!-- ELB → inst 3 (unhealthy) -->
  <path d="M390,195 Q390,260 742,255 L742,163" fill="none" stroke="#D13212" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arr-red)"/>

  <!-- Health check label -->
  <text x="390" y="273" text-anchor="middle" font-size="10" fill="#555">── ── Health Checks (GET /health)</text>

  <!-- No traffic to unhealthy -->
  <text x="742" y="200" text-anchor="middle" font-size="10" fill="#D13212" font-weight="600">sin tráfico</text>

  <!-- ── LEYENDA ──────────────────────────────────────────── -->
  <rect x="18" y="218" width="118" height="82" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="77" y="236" text-anchor="middle" font-size="10" fill="#555" font-weight="700">LEYENDA</text>
  <line x1="26" y1="247" x2="52" y2="247" stroke="#EC7211" stroke-width="2"/>
  <text x="56" y="251" font-size="10" fill="#555">Tráfico</text>
  <line x1="26" y1="263" x2="52" y2="263" stroke="#1D8348" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="56" y="267" font-size="10" fill="#555">Health Check ✓</text>
  <line x1="26" y1="279" x2="52" y2="279" stroke="#D13212" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="56" y="283" font-size="10" fill="#555">Health Check ✗</text>
  <rect x="26" y="287" width="10" height="10" rx="2" fill="#FDEDEC" stroke="#D13212" stroke-width="1"/>
  <text x="56" y="298" font-size="10" fill="#555">Sin tráfico</text>

</svg>
